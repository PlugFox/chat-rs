name: "Lint: Rust"

on:
  pull_request:
    paths:
      - "crates/**"
      - "xtask/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rustfmt.toml"
      - "clippy.toml"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-Dwarnings"

permissions:
  contents: read

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            crates
            xtask
            Cargo.toml
            Cargo.lock
            rustfmt.toml
            clippy.toml
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo +nightly fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            crates
            xtask
            Cargo.toml
            Cargo.lock
            clippy.toml
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --locked

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: chat
          POSTGRES_PASSWORD: chat
          POSTGRES_DB: chat_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chat -d chat_db"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
          --tmpfs /var/lib/postgresql/data
    env:
      DATABASE_URL: postgres://chat:chat@localhost/chat_db
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            crates
            xtask
            Cargo.toml
            Cargo.lock
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-targets --locked

  audit:
    name: Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            Cargo.toml
            Cargo.lock
            .cargo
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
