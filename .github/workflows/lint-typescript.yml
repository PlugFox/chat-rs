name: "Lint: TypeScript"

on:
  pull_request:
    paths:
      - "packages/chat_core_ts/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: packages/chat_core_ts

jobs:
  lint:
    name: Type Check & Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: packages/chat_core_ts
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/chat_core_ts/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm audit --omit=dev

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: packages/chat_core_ts
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/chat_core_ts/package-lock.json
      - run: npm ci
      - run: npm test
